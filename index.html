<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const NAVY='#1B3A6B', RED='#C0212B', GOLD='#E8A020', GREEN='#2E7D32';
const STORAGE_KEY='bp-saha-v3';
const BRANCHES=['Adliye Şubesi','Adana Yolu Şubesi','Cengiz Topel Şubesi','Andırın Caddesi Şubesi','Osmaniye Yolu Şubesi','Merkez Depo'];
const STEPS=['Genel','Raf & Plan.','SKT','Etiket','Depo','Personel','İade','Değerl.','Rapor'];

const initData={
  genel:{sube:'',tarih:new Date().toISOString().split('T')[0],bas:'',bitis:'',denetci:'Mehmet Konur'},
  raf:{planogram:'',marka:'',doluluk:'',fifo:'',notlar:'',photos:[]},
  skt:{sktVar:'',yakinVar:'',fifo:'',liste:[],notlar:'',photos:[]},
  etiket:{dogruluk:'',kampanya:'',eksik:'',yanlis:'',notlar:'',photos:[]},
  depo:{genel:'',fifo:'',transfer:'',iade:'',soguk:'',notlar:'',photos:[]},
  personel:{unifroma:'',hijyen:'',gorev:'',musteri:'',notlar:'',photos:[]},
  iade:{var:'',adet:'',firma:'',sure:'',notlar:'',photos:[]},
  degerl:{kritik:'',onceki:'',yeni:'',genel:'',photos:[]},
};

/* ── Helpers ── */
function calcScore(fd){
  const v=(val,g,m=[])=>val===''||val===undefined?null:g.includes(val)?1:m.includes(val)?0.6:0;
  const avg=a=>{const f=a.filter(x=>x!==null);return f.length?f.reduce((a,b)=>a+b,0)/f.length:0.7};
  return Math.round(
    avg([v(fd.raf.planogram,['Tam'],['Kısmi']),v(fd.raf.marka,['Tam'],['Kısmi']),v(fd.raf.fifo,['Tam'],['Kısmi'])])*20+
    avg([v(fd.skt.sktVar,['Hayır']),v(fd.skt.fifo,['Tam'],['Kısmi'])])*25+
    avg([v(fd.etiket.dogruluk,['Tam'],['Kısmi']),v(fd.etiket.kampanya,['Tam'],['Kısmi'])])*15+
    avg([v(fd.depo.genel,['İyi'],['Orta']),v(fd.depo.fifo,['Tam'],['Kısmi']),v(fd.depo.transfer,['Tam'],['Kısmi'])])*15+
    avg([v(fd.personel.unifroma,['Tam'],['Kısmi']),v(fd.personel.hijyen,['Tam'],['Kısmi']),v(fd.personel.gorev,['Tam'],['Kısmi'])])*15+
    avg([v(fd.iade.var,['Hayır'])])*10
  );
}
const sco=s=>s>=80?GREEN:s>=60?GOLD:RED;
const slbl=s=>s>=80?'✅ BAŞARILI':s>=60?'⚠️ GELİŞTİRİLMELİ':'🔴 KRİTİK';

function compressImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=1100,scale=Math.min(1,MAX/Math.max(img.width,img.height));
        canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',0.72));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ── Barcode Modal — fotoğraf çek → barkod oku (file:// uyumlu) ── */
function BarcodeModal({onClose,onResult}){
  const fileRef=useRef(null);
  const [status,setStatus]=useState('');
  const [manual,setManual]=useState('');
  const [found,setFound]=useState(null);
  const [searching,setSearching]=useState(false);
  const [step2,setStep2]=useState('idle'); // idle | scanning | found

  const handlePhoto=async(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    setStep2('scanning');
    setStatus('🔍 Barkod okunuyor...');
    try{
      if(!('BarcodeDetector' in window)){
        setStatus('❌ Cihaz barkod taramayı desteklemiyor. Manuel barkod girin.');
        setStep2('idle');return;
      }
      const bitmap=await createImageBitmap(file);
      const detector=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','itf']});
      const results=await detector.detect(bitmap);
      if(results.length>0){
        await lookupProduct(results[0].rawValue);
      }else{
        setStatus('⚠️ Barkod okunamadı. Tekrar çekin veya daha yakından çekin.');
        setStep2('idle');
      }
    }catch(err){
      setStatus('⚠️ Hata oluştu. Manuel barkod girin.');
      setStep2('idle');
    }
    e.target.value='';
  };

  const lookupProduct=async(barcode)=>{
    setSearching(true);setStatus('🌐 Ürün bilgisi aranıyor...');
    let name='';
    try{
      const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
      const data=await res.json();
      if(data.status===1){
        name=data.product.product_name_tr||data.product.product_name||data.product.abbreviated_product_name||'';
        name=name.trim().split(',')[0].trim();
      }
    }catch(e){}
    setFound({barcode,name});
    setSearching(false);setStep2('found');
    setStatus(name?'✅ Ürün bulundu':'⚠️ Ürün bulunamadı — adı yazın');
  };

  const doManual=async()=>{
    const code=manual.trim();
    if(!code) return;
    await lookupProduct(code);
  };

  const confirm=()=>{if(found) onResult(found);onClose();};

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.95)',zIndex:2000,display:'flex',flexDirection:'column',overflowY:'auto'}}>
      {/* Header */}
      <div style={{background:NAVY,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <span style={{color:'white',fontWeight:700,fontSize:16}}>📷 Barkod Tara</span>
        <button onClick={onClose} style={{background:'none',border:'none',color:'white',fontSize:28,cursor:'pointer',lineHeight:1,padding:'0 4px'}}>×</button>
      </div>

      <div style={{flex:1,display:'flex',flexDirection:'column',padding:20,gap:16}}>

        {/* Nasıl Çalışır */}
        {step2==='idle'&&!searching&&(
          <div style={{background:'rgba(255,255,255,0.08)',borderRadius:12,padding:16,color:'#ccc',fontSize:13,lineHeight:1.7}}>
            <div style={{color:'white',fontWeight:700,fontSize:15,marginBottom:8}}>📷 Barkod Nasıl Taranır?</div>
            <div>1. Aşağıdaki "📷 Fotoğraf Çek" butonuna basın</div>
            <div>2. Barkodu ekrana getirip fotoğraf çekin</div>
            <div>3. Uygulama barkodu otomatik okur</div>
          </div>
        )}

        {/* Fotoğraf çek butonu */}
        {step2!=='found'&&(
          <button onClick={()=>fileRef.current?.click()} disabled={searching}
            style={{padding:'18px',background:searching?'#555':GOLD,color:'white',border:'none',borderRadius:14,fontWeight:700,fontSize:18,cursor:searching?'default':'pointer',flexShrink:0}}>
            {searching?'⏳ İşleniyor...':'📷 Fotoğraf Çek'}
          </button>
        )}
        <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:'none'}}/>

        {/* Status */}
        {status&&(
          <div style={{textAlign:'center',color:status.startsWith('✅')?'#4CAF50':status.startsWith('❌')||status.startsWith('⚠️')?GOLD:'#90CAF9',fontSize:14,fontWeight:600}}>
            {status}
          </div>
        )}

        {/* Found result */}
        {found&&step2==='found'&&(
          <div style={{background:'white',borderRadius:14,padding:18}}>
            <div style={{fontSize:11,color:'#888',marginBottom:3}}>Okunan Barkod:</div>
            <div style={{fontWeight:700,fontSize:17,color:NAVY,marginBottom:14,fontFamily:'monospace'}}>{found.barcode}</div>
            <div style={{fontSize:12,color:'#666',marginBottom:6}}>
              Ürün Adı:{!found.name&&<span style={{color:GOLD,marginLeft:6}}>Bulunamadı — lütfen girin</span>}
            </div>
            <input value={found.name} onChange={e=>setFound({...found,name:e.target.value})} placeholder="Ürün adını girin..."
              style={{width:'100%',padding:'12px',border:'1.5px solid #ddd',borderRadius:9,fontSize:15,boxSizing:'border-box',marginBottom:14,outline:'none'}}/>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>{setFound(null);setStep2('idle');setStatus('');}}
                style={{flex:1,padding:13,background:'#eee',color:'#333',border:'none',borderRadius:9,fontWeight:600,cursor:'pointer',fontSize:14}}>
                ↩ Tekrar
              </button>
              <button onClick={confirm}
                style={{flex:2,padding:13,background:GREEN,color:'white',border:'none',borderRadius:9,fontWeight:700,cursor:'pointer',fontSize:15}}>
                ✅ Ekle
              </button>
            </div>
          </div>
        )}

        {/* Ayraç */}
        {step2!=='found'&&<div style={{display:'flex',alignItems:'center',gap:10,color:'#666',fontSize:12}}><div style={{flex:1,height:1,background:'rgba(255,255,255,0.15)'}}/><span>veya</span><div style={{flex:1,height:1,background:'rgba(255,255,255,0.15)'}}/></div>}

        {/* Manuel giriş */}
        {step2!=='found'&&(
          <div>
            <div style={{color:'#aaa',fontSize:12,marginBottom:8}}>Barkod numarasını manuel girin:</div>
            <div style={{display:'flex',gap:8}}>
              <input value={manual} onChange={e=>setManual(e.target.value)} placeholder="8690000000000" type="number"
                onKeyDown={e=>e.key==='Enter'&&doManual()}
                style={{flex:1,padding:'12px',border:'none',borderRadius:9,fontSize:15,outline:'none',background:'white'}}/>
              <button onClick={doManual}
                style={{padding:'12px 18px',background:GOLD,color:'white',border:'none',borderRadius:9,fontWeight:700,cursor:'pointer',fontSize:14}}>Ara</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Install Banner ── */
function InstallBanner(){
  const [show,setShow]=useState(false);
  const [dismissed,setDismissed]=useState(false);
  useEffect(()=>{
    const d=localStorage.getItem('bp-install-dismissed');
    if(d) return;
    const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
    if(!isStandalone) setShow(true);
  },[]);
  if(!show||dismissed) return null;
  return(
    <div style={{background:GOLD,padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
      <div style={{fontSize:12,color:'white',fontWeight:600,lineHeight:1.4}}>
        📲 <b>Ana Ekrana Ekle</b><br/>
        <span style={{fontWeight:400,opacity:.9}}>Tarayıcı menüsü → "Ana ekrana ekle"</span>
      </div>
      <button onClick={()=>{setDismissed(true);localStorage.setItem('bp-install-dismissed','1');}} style={{background:'rgba(255,255,255,0.3)',border:'none',color:'white',borderRadius:6,padding:'6px 10px',fontSize:12,cursor:'pointer',fontWeight:600,flexShrink:0}}>
        Tamam
      </button>
    </div>
  );
}

/* ── Photo Picker ── */
function PhotoPicker({photos=[],onChange}){
  const inputRef=useRef(null);
  const handleFile=async(e)=>{
    const file=e.target.files[0];if(!file) return;
    const data=await compressImage(file);
    onChange([...photos,{id:Date.now(),data}]);
    e.target.value='';
  };
  const remove=id=>onChange(photos.filter(p=>p.id!==id));
  return(
    <div style={{marginTop:16,paddingTop:14,borderTop:'1px solid #eee'}}>
      <div style={{fontSize:13,fontWeight:600,color:'#444',marginBottom:10}}>📸 Fotoğraflar</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:9}}>
        {photos.map(p=>(
          <div key={p.id} style={{position:'relative'}}>
            <img src={p.data} style={{width:86,height:86,objectFit:'cover',borderRadius:10,border:'1px solid #ddd',display:'block'}}/>
            <button onClick={()=>remove(p.id)} style={{position:'absolute',top:-7,right:-7,width:23,height:23,borderRadius:'50%',background:RED,color:'white',border:'2.5px solid white',fontSize:13,cursor:'pointer',lineHeight:1,padding:0,fontWeight:700}}>×</button>
          </div>
        ))}
        <button onClick={()=>inputRef.current?.click()} style={{width:86,height:86,borderRadius:10,border:`2px dashed ${GOLD}`,background:'#FFFBEF',color:GOLD,fontSize:30,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>📷</button>
      </div>
      <input ref={inputRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:'none'}}/>
    </div>
  );
}

/* ── UI Primitives ── */
function Radio({label,opts,value,onChange,req}){
  return(<div style={{marginBottom:18}}>
    <div style={{fontSize:13,fontWeight:600,color:'#222',marginBottom:8}}>{label}{req&&<span style={{color:RED}}> *</span>}</div>
    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
      {opts.map(o=><button key={o.v} onClick={()=>onChange(o.v)} style={{padding:'9px 15px',borderRadius:22,border:`2px solid ${value===o.v?o.c||NAVY:'#ddd'}`,background:value===o.v?o.c||NAVY:'white',color:value===o.v?'white':'#333',fontSize:13,cursor:'pointer',fontWeight:value===o.v?700:400}}>{o.l}</button>)}
    </div>
  </div>);
}
function TInput({label,value,onChange,type='text',placeholder,half}){
  return(<div style={{marginBottom:14,flex:half?1:undefined}}>
    {label&&<div style={{fontSize:13,fontWeight:600,color:'#222',marginBottom:5}}>{label}</div>}
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||''}
      style={{width:'100%',padding:'11px 12px',border:'1.5px solid #ddd',borderRadius:9,fontSize:14,outline:'none',background:'white'}}/>
  </div>);
}
function TArea({label,value,onChange,placeholder,rows=3}){
  return(<div style={{marginBottom:14}}>
    {label&&<div style={{fontSize:13,fontWeight:600,color:'#222',marginBottom:5}}>{label}</div>}
    <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||''} rows={rows}
      style={{width:'100%',padding:'11px 12px',border:'1.5px solid #ddd',borderRadius:9,fontSize:13,outline:'none',resize:'vertical',background:'white'}}/>
  </div>);
}
function Card({children,bg='#fff',border='#E0E0E0',accent}){
  return(<div style={{background:bg,border:`1px solid ${border}`,borderLeft:accent?`4px solid ${accent}`:undefined,borderRadius:12,padding:16,marginBottom:14}}>{children}</div>);
}
function SecTitle({icon,title,sub}){
  return(<div style={{marginBottom:20}}><h2 style={{color:NAVY,fontSize:19,fontWeight:800,margin:0}}>{icon} {title}</h2>{sub&&<p style={{color:'#666',fontSize:13,margin:'4px 0 0'}}>{sub}</p>}</div>);
}

      <div style={{marginBottom:14}}>

        <select value={d.sube} onChange={e=>upd('genel','sube',e.target.value)} style={{width:'100%',padding:'11px 12px',border:'1.5px solid #ddd',borderRadius:9,fontSize:14,background:'white',outline:'none'}}>

      </div>
      <TInput label="Denetçi" value={d.denetci} onChange={v=>upd('genel','denetci',v)}/>

  const d=fd.raf;

  return(<div>

      <Radio label="Marka Blok Uygulaması" opts={o3} value={d.marka} onChange={v=>upd('raf','marka',v)} req/>

function Sec2({fd,setFd,save,step,updP}){
  const d=fd.skt;
  const [item,setItem]=useState({barkod:'',urun:'',skt:'',miktar:'',alan:''});
  const [scanner,setScanner]=useState(false);
  const updF=(f,v)=>{const nd={...fd,skt:{...d,[f]:v}};setFd(nd);save(nd,step);};
  const addItem=()=>{
    if(!item.urun.trim()) return;
    const nd={...fd,skt:{...d,liste:[...(d.liste||[]),{...item,id:Date.now()}]}};
    setFd(nd);save(nd,step);setItem({barkod:'',urun:'',skt:'',miktar:'',alan:''});
  };
  const del=id=>{const nd={...fd,skt:{...d,liste:d.liste.filter(x=>x.id!==id)}};setFd(nd);save(nd,step);};
  const onScan=result=>setItem(prev=>({...prev,barkod:result.barcode,urun:result.name||prev.urun}));
  return(<div>
    {scanner&&<BarcodeModal onClose={()=>setScanner(false)} onResult={onScan}/>}
    <SecTitle icon="⏰" title="SKT Kontrolü" sub="Son kullanma tarihi ve FIFO denetimi"/>
    <Card>
      <Radio label="SKT Geçmiş Ürün Var Mı?" opts={[{v:'Hayır',l:'✅ Hayır',c:GREEN},{v:'Evet',l:'🔴 Evet',c:RED}]} value={d.sktVar} onChange={v=>updF('sktVar',v)} req/>
      <Radio label="Yakın SKT (7 gün içinde)?" opts={[{v:'Hayır',l:'✅ Hayır',c:GREEN},{v:'Evet',l:'⚠️ Evet',c:GOLD}]} value={d.yakinVar} onChange={v=>updF('yakinVar',v)}/>
      <Radio label="FIFO Uygulaması" opts={[{v:'Tam',l:'✅ Tam',c:GREEN},{v:'Kısmi',l:'⚠️ Kısmi',c:GOLD},{v:'Yok',l:'🔴 Yok',c:RED}]} value={d.fifo} onChange={v=>updF('fifo',v)} req/>
    </Card>
    <div style={{background:'#FDECEA',border:`1px solid ${RED}`,borderRadius:12,padding:16,marginBottom:14}}>
      <div style={{fontWeight:700,color:RED,fontSize:15,marginBottom:12}}>🔴 SKT / Sorunlu Ürün Listesi</div>
      <div style={{background:'white',borderRadius:9,padding:12,marginBottom:10}}>
        <div style={{display:'flex',gap:8,marginBottom:8,alignItems:'flex-end'}}>
          <div style={{flex:1}}>

  const [status,setStatus]=useState('');
  const [loaded,setLoaded]=useState(false);
  const showS=(msg,ms=2200)=>{setStatus(msg);setTimeout(()=>setStatus(''),ms);};
  const save=useCallback((data,s)=>{
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify({fd:data,step:s}));setStatus('☁️ Kaydedildi');setTimeout(()=>setStatus(''),2000);}
    catch(e){setStatus('⚠️ Kayıt hatası');}
  },[]);
  useEffect(()=>{
    try{
      const raw=localStorage.getItem(STORAGE_KEY);
      if(raw){const saved=JSON.parse(raw);if(saved.fd) setFd(saved.fd);if(saved.step!==undefined) setStep(saved.step);showS('☁️ Kaldığınız yerden devam ediliyor',3000);}
    }catch(e){}
    setLoaded(true);
  },[]);
  const upd=(sec,field,value)=>{const nd={...fd,[sec]:{...fd[sec],[field]:value}};setFd(nd);save(nd,step);};
  const updP=(sec,photos)=>{const nd={...fd,[sec]:{...fd[sec],photos}};setFd(nd);save(nd,step);};
  const goTo=ns=>{setStep(ns);save(fd,ns);};
  const onPDF=()=>{
    const html=buildHTML(fd,calcScore(fd));
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const w=window.open(url,'_blank');
    if(w) w.addEventListener('load',()=>setTimeout(()=>w.print(),500));
    setTimeout(()=>URL.revokeObjectURL(url),30000);
  };
  const onWord=()=>{
    const html=buildHTML(fd,calcScore(fd));
    const blob=new Blob(['\ufeff'+html],{type:'application/msword;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`Denetim_${(fd.genel.sube||'Sube').replace(/ /g,'_')}_${fd.genel.tarih||'tarih'}.doc`;
    a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);
  };
  const onClear=()=>{
    if(!confirm('Formu sıfırlamak istediğinize emin misiniz?')) return;
    localStorage.removeItem(STORAGE_KEY);setFd(initData);setStep(0);showS('🗑️ Form sıfırlandı');
  };
  if(!loaded) return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',background:NAVY,color:'white',gap:14}}><div style={{fontSize:40}}>☁️</div><div style={{fontSize:16,fontWeight:600}}>Yükleniyor...</div></div>);
  const sections=[
    <Sec0 fd={fd} upd={upd}/>,
    <Sec1 fd={fd} upd={upd} updP={updP}/>,
    <Sec2 fd={fd} setFd={setFd} save={save} step={step} updP={updP}/>,
    <Sec3 fd={fd} upd={upd} updP={updP}/>,
    <Sec4 fd={fd} upd={upd} updP={updP}/>,
    <Sec5 fd={fd} upd={upd} updP={updP}/>,
    <Sec6 fd={fd} upd={upd} updP={updP}/>,
    <Sec7 fd={fd} upd={upd} updP={updP}/>,
    <Sec8 fd={fd} onPDF={onPDF} onWord={onWord} onClear={onClear}/>,
  ];
  const progress=((step+1)/STEPS.length)*100;
  return(
    <div style={{fontFamily:'system-ui,-apple-system,sans-serif',maxWidth:700,margin:'0 auto',background:'#F4F6FA',minHeight:'100vh'}}>
      <div style={{background:NAVY,color:'white',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 10px rgba(0,0,0,0.3)'}}>
        <div><div style={{fontWeight:800,fontSize:15,letterSpacing:.5}}>🏪 BİZİM PAZAR</div><div style={{fontSize:11,opacity:.7,marginTop:1}}>Saha Denetim Formu</div></div>
        <div style={{fontSize:11,color:'#90CAF9',maxWidth:160,textAlign:'right'}}>{status}</div>
      </div>
      <InstallBanner/>
      <div style={{background:'#E8EEF7',padding:'10px 16px 9px'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
          <span style={{fontSize:13,color:NAVY,fontWeight:700}}>{STEPS[step]}</span>
          <span style={{fontSize:12,color:'#666'}}>{step+1}/{STEPS.length}</span>
        </div>
        <div style={{height:5,background:'#C9D6EA',borderRadius:3}}><div style={{height:'100%',width:`${progress}%`,background:GOLD,borderRadius:3,transition:'width 0.3s'}}/></div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:8}}>
          {STEPS.map((_,i)=>(
            <button key={i} onClick={()=>goTo(i)} title={STEPS[i]} style={{width:26,height:26,borderRadius:'50%',border:'none',cursor:'pointer',background:i<step?GOLD:i===step?NAVY:'#C9D6EA',color:'white',fontSize:10,fontWeight:700,padding:0,boxShadow:i===step?'0 2px 6px rgba(27,58,107,0.4)':'none',transition:'all 0.2s'}}>{i+1}</button>
          ))}
        </div>
      </div>
      <div style={{padding:'18px 16px 130px'}}>{sections[step]}</div>
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:700,background:'white',borderTop:'1px solid #e0e0e0',padding:'10px 16px',display:'flex',gap:10,boxShadow:'0 -2px 10px rgba(0,0,0,0.08)',zIndex:99}}>
        {step>0&&<button onClick={()=>goTo(step-1)} style={{flex:1,padding:14,background:'#E8EEF7',color:NAVY,border:'none',borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer'}}>← Geri</button>}
        {step<STEPS.length-1&&<button onClick={()=>goTo(step+1)} style={{flex:2,padding:14,background:NAVY,color:'white',border:'none',borderRadius:10,fontWeight:700,fontSize:15,cursor:'pointer',boxShadow:'0 3px 8px rgba(27,58,107,0.3)'}}>İleri →</button>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
