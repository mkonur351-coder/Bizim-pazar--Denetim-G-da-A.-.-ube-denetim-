const LKEY='bp-v4';

const STEPS=['Genel','Raf','SKT','Etiket','Depo','Personel','İade','Değerl.','Rapor'];
const USERS=[
  {id:'admin',name:'Mehmet Konur',role:'admin',pin:'1234',sube:null,label:'👑 Admin — Mehmet Konur'},
  {id:'adliye',name:'Adliye Şubesi',role:'personel',pin:'1001',sube:'Adliye Şubesi',label:'🏪 Adliye Şubesi'},
  {id:'adana',name:'Adana Yolu Şubesi',role:'personel',pin:'1002',sube:'Adana Yolu Şubesi',label:'🏪 Adana Yolu Şubesi'},
  {id:'cengiz',name:'Cengiz Topel Şubesi',role:'personel',pin:'1003',sube:'Cengiz Topel Şubesi',label:'🏪 Cengiz Topel Şubesi'},
  {id:'andirin',name:'Andırın Cad. Şubesi',role:'personel',pin:'1004',sube:'Andırın Caddesi Şubesi',label:'🏪 Andırın Caddesi Şubesi'},
  {id:'osmaniye',name:'Osmaniye Yolu Şubesi',role:'personel',pin:'1005',sube:'Osmaniye Yolu Şubesi',label:'🏪 Osmaniye Yolu Şubesi'},
  {id:'depo',name:'Merkez Depo',role:'personel',pin:'1006',sube:'Merkez Depo',label:'🏭 Merkez Depo'},

// ── State Management ───────────────────────────────────────────────
let state = {
  view: 'login', // login | form | admin | detail
  user: null,
  step: 0,
  fd: null,
  status: '',
  statusTimer: null,
  denetimler: [],
  selDenetim: null,
  loginSel: null,
  loginPin: '',
  loginErr: '',
  adminFilt: '',
  submitting: false,
  submitted: false,
  scannerOpen: false,
  scannerFor: null,
  sktItem: {barkod:'',urun:'',gramaj:'',skt:'',miktar:'',alan:''},
  fbReady: false,
};

function mkFd(user) {
  return {
    genel:{sube:user?.sube||'',tarih:new Date().toISOString().split('T')[0],bas:'',bitis:'',denetci:user?.name||''},
    raf:{planogram:'',marka:'',doluluk:'',fifo:'',notlar:'',photos:[]},
    skt:{sktVar:'',yakinVar:'',fifo:'',liste:[],notlar:'',photos:[]},
    etiket:{dogruluk:'',kampanya:'',eksik:'',yanlis:'',notlar:'',photos:[]},
    depo:{genel:'',fifo:'',transfer:'',iade:'',soguk:'',notlar:'',photos:[]},
    personel:{unifroma:'',hijyen:'',gorev:'',musteri:'',notlar:'',photos:[]},
    iade:{var:'',adet:'',firma:'',sure:'',notlar:'',photos:[]},
    degerl:{kritik:'',onceki:'',yeni:'',genel:'',photos:[]},
  };
}

function calcScore(fd) {
  const v=(val,g,m=[])=>val===''||val===undefined?null:g.includes(val)?1:m.includes(val)?0.6:0;
  const avg=a=>{const f=a.filter(x=>x!==null);return f.length?f.reduce((a,b)=>a+b,0)/f.length:0.7};
  return Math.round(
    avg([v(fd.raf.planogram,['Tam'],['Kısmi']),v(fd.raf.marka,['Tam'],['Kısmi']),v(fd.raf.fifo,['Tam'],['Kısmi'])])*20+
    avg([v(fd.skt.sktVar,['Hayır']),v(fd.skt.fifo,['Tam'],['Kısmi'])])*25+
    avg([v(fd.etiket.dogruluk,['Tam'],['Kısmi']),v(fd.etiket.kampanya,['Tam'],['Kısmi'])])*15+
    avg([v(fd.depo.genel,['İyi'],['Orta']),v(fd.depo.fifo,['Tam'],['Kısmi']),v(fd.depo.transfer,['Tam'],['Kısmi'])])*15+
    avg([v(fd.personel.unifroma,['Tam'],['Kısmi']),v(fd.personel.hijyen,['Tam'],['Kısmi']),v(fd.personel.gorev,['Tam'],['Kısmi'])])*15+
    avg([v(fd.iade.var,['Hayır'])])*10
  );
}
const sco=s=>s>=80?GREEN:s>=60?GOLD:RED;
const slbl=s=>s>=80?'✅ BAŞARILI':s>=60?'⚠️ GELİŞTİRİLMELİ':'🔴 KRİTİK';

function showStatus(msg,ms=2200){
  state.status=msg;
  if(state.statusTimer) clearTimeout(state.statusTimer);
  state.statusTimer=setTimeout(()=>{state.status='';render();},ms);
  render();
}

function saveFd(){
  try{localStorage.setItem(LKEY,JSON.stringify({fd:state.fd,step:state.step}));}catch(e){}
  showStatus('☁️ Kaydedildi');
}

function compress(file){
  return new Promise(r=>{
    const rd=new FileReader();
    rd.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        const M=900,s=Math.min(1,M/Math.max(img.width,img.height));
        c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        r(c.toDataURL('image/jpeg',0.65));
      };
      img.src=e.target.result;
    };
    rd.readAsDataURL(file);
  });
}

async function fbSave(data){
  if(!window._fbOk) return null;
  try{
    const{collection,addDoc,serverTimestamp}=window._fc;
    const ref=await addDoc(collection(window._db,'denetimler'),{...data,ts:serverTimestamp(),ca:new Date().toISOString()});
    return ref.id;
  }catch(e){console.error(e);return null;}
}

async function fbGet(sube=null){
  if(!window._fbOk) return[];
  try{
    const{collection,getDocs,query,orderBy,where}=window._fc;
    const q=sube
      ?query(collection(window._db,'denetimler'),where('sube','==',sube),orderBy('ca','desc'))
      :query(collection(window._db,'denetimler'),orderBy('ca','desc'));
    const snap=await getDocs(q);
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){console.error(e);return[];}
}

// ── HTML Helpers ───────────────────────────────────────────────────
const h = (tag, attrs={}, ...children) => {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') el.className = v;
    else el.setAttribute(k, v);
  }
  for (const c of children) {
    if (c === null || c === undefined) continue;
    if (typeof c === 'string' || typeof c === 'number') el.appendChild(document.createTextNode(String(c)));
    else if (c instanceof Node) el.appendChild(c);
    else if (Array.isArray(c)) c.forEach(x => x && el.appendChild(typeof x === 'string' ? document.createTextNode(x) : x));
  }
  return el;
};

function div(style, ...children) { return h('div', {style}, ...children); }
function btn(style, onClick, ...children) { return h('button', {style, onClick}, ...children); }

// ── UI Components ──────────────────────────────────────────────────
function card(children, extra={}) {
  return div({background:'#fff',border:'1px solid #E0E0E0',borderLeft:extra.accent?`4px solid ${extra.accent}`:undefined,borderRadius:12,padding:16,marginBottom:14,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',...(extra.style||{})}, ...children);
}

function radio(label, opts, value, onChange, req=false) {
  const container = div({marginBottom:18});
  const lbl = div({fontSize:13,fontWeight:600,color:'#222',marginBottom:8}, label);
  if(req) lbl.appendChild(h('span',{style:{color:RED}},' *'));
  const row = div({display:'flex',gap:8,flexWrap:'wrap'});
  opts.forEach(o=>{
    const b = btn({
      padding:'9px 14px',borderRadius:22,
      border:`2px solid ${value===o.v?o.c||NAVY:'#ddd'}`,
      background:value===o.v?o.c||NAVY:'white',
      color:value===o.v?'white':'#333',
      fontSize:13,cursor:'pointer',fontWeight:value===o.v?700:400
    }, ()=>onChange(o.v), o.l);
    row.appendChild(b);
  });
  container.appendChild(lbl);
  container.appendChild(row);
  return container;
}

function textInput(label, value, onChange, opts={}) {
  const wrap = div({marginBottom:14,flex:opts.half?1:undefined});
  if(label) wrap.appendChild(div({fontSize:13,fontWeight:600,color:'#222',marginBottom:5}, label));
  const inp = h('input', {
    type:opts.type||'text',
    value:value||'',
    placeholder:opts.placeholder||'',
    style:{width:'100%',padding:'11px 12px',border:'1.5px solid #ddd',borderRadius:9,fontSize:14,outline:'none',background:'white'}
  });
  inp.addEventListener('input', e=>onChange(e.target.value));
  wrap.appendChild(inp);
  return wrap;
}

function textarea(label, value, onChange, opts={}) {
  const wrap = div({marginBottom:14});
  if(label) wrap.appendChild(div({fontSize:13,fontWeight:600,color:'#222',marginBottom:5}, label));
  const ta = h('textarea', {
    placeholder:opts.placeholder||'',
    rows:opts.rows||3,
    style:{width:'100%',padding:'11px 12px',border:'1.5px solid #ddd',borderRadius:9,fontSize:13,outline:'none',resize:'vertical',background:'white'}
  });
  ta.value = value||'';
  ta.addEventListener('input', e=>onChange(e.target.value));
  wrap.appendChild(ta);
  return wrap;
}

function photoPicker(photos, onChange) {
  const wrap = div({marginTop:16,paddingTop:14,borderTop:'1px solid #eee'});
  wrap.appendChild(div({fontSize:13,fontWeight:600,color:'#444',marginBottom:10},'📸 Fotoğraflar'));
  const row = div({display:'flex',flexWrap:'wrap',gap:9});
  photos.forEach(p=>{
    const pw = div({position:'relative'});
    const img = h('img',{src:p.data,style:{width:80,height:80,objectFit:'cover',borderRadius:10,border:'1px solid #ddd',display:'block'}});
    const del = btn({position:'absolute',top:-7,right:-7,width:22,height:22,borderRadius:'50%',background:RED,color:'white',border:'2px solid white',fontSize:13,cursor:'pointer',lineHeight:1,padding:0,fontWeight:700},
      ()=>onChange(photos.filter(x=>x.id!==p.id)), '×');
    pw.appendChild(img); pw.appendChild(del);
    row.appendChild(pw);
  });
  const inp = h('input',{type:'file',accept:'image/*',capture:'environment',style:{display:'none'}});
  inp.addEventListener('change', async e=>{
    const f=e.target.files[0]; if(!f) return;
    const data=await compress(f);
    onChange([...photos,{id:Date.now(),data}]);
    e.target.value='';
  });
  const addBtn = btn({width:80,height:80,borderRadius:10,border:`2px dashed ${GOLD}`,background:'#FFFBEF',color:GOLD,fontSize:28,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'},
    ()=>inp.click(), '📷');
  row.appendChild(addBtn);
  wrap.appendChild(row);
  wrap.appendChild(inp);
  return wrap;
}

function secTitle(icon, title, sub) {
  const wrap = div({marginBottom:20});
  wrap.appendChild(h('h2',{style:{color:NAVY,fontSize:19,fontWeight:800,margin:0}}, `${icon} ${title}`));
  if(sub) wrap.appendChild(div({color:'#666',fontSize:13,margin:'4px 0 0'}, sub));
  return wrap;
}

function scoreBox(score) {
  const sc2=sco(score);
  return div({background:sc2,color:'white',borderRadius:14,padding:'22px 20px',textAlign:'center',marginBottom:20},
    div({fontSize:56,fontWeight:800,lineHeight:1}, String(score)),
    div({fontSize:14,opacity:.85,margin:'4px 0'}, '/100 Puan'),
    div({fontSize:15,fontWeight:700}, slbl(score))
  );
}

// ── Report Builder ─────────────────────────────────────────────────
function buildRpt(fd,score){
  const ns=v=>v||'-',g=fd.genel,sc2=sco(score);
  const sktR=(fd.skt.liste||[]).map(it=>`<tr><td>${ns(it.barkod)}</td><td><b>${it.urun}</b>${it.gramaj?` <small>${it.gramaj}</small>`:''}</td><td>${ns(it.skt)}</td><td>${ns(it.miktar)}</td><td>${ns(it.alan)}</td></tr>`).join('');
  const row=(l,v)=>v?`<div class="row"><span class="lbl">${l}</span><span>${v}</span></div>`:'';
  const pg=(ph=[])=>ph.length>0?`<div class="ph"><div class="pl">📸 Fotoğraflar:</div><div class="pg">${ph.slice(0,6).map(p=>`<img src="${p.data}">`).join('')}</div></div>`:'';
  return`<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>Saha Denetim Raporu</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;font-size:12px;color:#1a1a1a}.hdr{background:#1B3A6B;color:white;padding:18px 24px;text-align:center}.hdr h1{font-size:18px;font-weight:800}.body{padding:20px 24px}.sb{display:inline-block;background:${sc2};color:white;border-radius:10px;padding:14px 20px;text-align:center;margin:14px 0}.sb .n{font-size:40px;font-weight:800;line-height:1}.sb .lb{font-size:13px;font-weight:700;margin-top:5px}table.m{width:100%;border-collapse:collapse;margin:12px 0}table.m td{border:1px solid #ddd;padding:7px 10px}table.m td:first-child{background:#E8EEF7;font-weight:600;width:38%}.sec{background:#E8A020;color:white;padding:7px 12px;font-weight:700;font-size:12px;margin:14px 0 7px;border-radius:5px}.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee}.lbl{color:#555}.note{background:#F0F4FA;border-left:3px solid #1B3A6B;padding:7px 10px;font-size:11px;color:#444;margin:6px 0}.rb{background:#FDECEA;border:1px solid #C0212B;border-radius:7px;padding:12px;margin:10px 0}.rb h4{color:#C0212B;margin-bottom:8px}table.dt{width:100%;border-collapse:collapse;font-size:11px}table.dt th{background:#C0212B;color:white;padding:5px 8px;text-align:left}table.dt td{border:1px solid #ddd;padding:5px 8px}.ph{margin:10px 0}.pl{font-weight:600;font-size:11px;margin-bottom:7px}.pg{display:flex;flex-wrap:wrap;gap:7px}.pg img{width:150px;height:113px;object-fit:cover;border-radius:6px;border:1px solid #ddd}.sig{margin-top:36px;border-top:2px solid #1B3A6B;padding-top:14px}@media print{body{margin:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body><div class="hdr"><h1>BİZİM PAZAR GIDA A.Ş.</h1><p>Saha Denetim Raporu</p></div><div class="body"><table class="m"><tr><td>Şube</td><td>${ns(g.sube)}</td></tr><tr><td>Tarih</td><td>${ns(g.tarih)}</td></tr><tr><td>Saat</td><td>${ns(g.bas)} – ${ns(g.bitis)}</td></tr><tr><td>Denetçi</td><td>${ns(g.denetci)}</td></tr></table><div class="sb"><div class="n">${score}</div><div>/100</div><div class="lb">${slbl(score).replace(/[✅⚠️🔴] /,'')}</div></div>${renderSections(fd,row,sktR,pg)}<div class="sig"><div style="font-weight:700;color:#1B3A6B;font-size:13px">${ns(g.denetci)}</div><div style="color:#666;font-size:11px">Operasyon Müdürü | Bizim Pazar Gıda A.Ş.</div></div></div></body></html>`;

function renderLogin() {
  const wrap = h('div',{className:'login-wrap'});
  const hero = div({marginBottom:24,textAlign:'center'},
    div({fontSize:52,marginBottom:8},'🏪'),
    div({color:'white',fontSize:22,fontWeight:800},'BİZİM PAZAR'),

  );
  const box = h('div',{className:'login-box'});
  box.appendChild(h('div',{className:'login-title'},'Giriş Yap'));
  box.appendChild(h('div',{className:'login-label'},'Kullanıcı'));
  const userList = div({marginBottom:16});
  USERS.forEach(u=>{
    const cls = state.loginSel===u.id ? (u.role==='admin'?'user-btn active-admin':'user-btn active-user') : 'user-btn';
    const b = h('button',{className:cls, onClick:()=>{state.loginSel=u.id;state.loginPin='';state.loginErr='';render();}}, u.label);
    userList.appendChild(b);
  });
  box.appendChild(userList);
  if(state.loginSel) {
    const pinWrap = div({marginBottom:16});
    pinWrap.appendChild(div({fontSize:13,fontWeight:600,color:'#444',marginBottom:8},'PIN'));
    const pinInp = h('input',{
      type:'password',placeholder:'••••',
      className:'pin-input',
      style:{borderColor:state.loginErr?RED:'#ddd'}
    });
    pinInp.value = state.loginPin;
    pinInp.addEventListener('input', e=>{state.loginPin=e.target.value;});
    pinInp.addEventListener('keydown', e=>{if(e.key==='Enter') doLogin();});
    pinWrap.appendChild(pinInp);
    box.appendChild(pinWrap);
  }
  if(state.loginErr) box.appendChild(div({color:RED,fontSize:13,marginBottom:12,textAlign:'center'}, state.loginErr));
  box.appendChild(h('button',{className:'login-btn',onClick:doLogin},'Giriş Yap →'));
    wrap.appendChild(hero);
  wrap.appendChild(box);
  wrap.appendChild(h('div',{className:'login-footer'},'Bizim Pazar Gıda A.Ş.'));
  return wrap;
}

function doLogin(){
  if(!state.loginSel){state.loginErr='Kullanıcı seçin';render();return;}
  const u=USERS.find(x=>x.id===state.loginSel);
  if(u&&u.pin===state.loginPin){
    state.user=u;state.loginErr='';
    localStorage.setItem('bp-user',JSON.stringify(u));
    if(u.role==='admin'){state.view='admin';loadDenetimler();}
    else{
      state.view='form';state.step=0;
      try{const s=localStorage.getItem(LKEY);if(s){const p=JSON.parse(s);state.fd=p.fd||mkFd(u);state.step=p.step||0;}else state.fd=mkFd(u);}
      catch(e){state.fd=mkFd(u);}
    }
    render();
  }else{state.loginErr='❌ PIN hatalı';state.loginPin='';render();}
}

    c.appendChild(radio('Bekleyen İade Ürün Var Mı?',[{v:'Hayır',l:'✅ Hayır',c:GREEN},{v:'Evet',l:'⚠️ Evet',c:GOLD}],fd.iade.var,v=>updFd('iade','var',v),true));

function addSktItem(){
  if(!state.sktItem.urun.trim()) return;
  state.fd.skt.liste=[...(state.fd.skt.liste||[]),{...state.sktItem,id:Date.now()}];
  state.sktItem={barkod:'',urun:'',gramaj:'',skt:'',miktar:'',alan:''};
  saveFd();
}
function delSktItem(id){state.fd.skt.liste=state.fd.skt.liste.filter(x=>x.id!==id);saveFd();}

function openScanner(){state.scannerOpen=true;render();setTimeout(()=>{document.getElementById('scanner-file')?.click();},100);}

function renderScanner(){
  const wrap=div({position:'fixed',inset:0,background:'rgba(0,0,0,0.95)',zIndex:2000,display:'flex',flexDirection:'column'});
  const hdr=div({background:NAVY,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0});
  hdr.appendChild(div({color:'white',fontWeight:700,fontSize:16},'📷 Barkod Tara'));
  hdr.appendChild(btn({background:'none',border:'none',color:'white',fontSize:28,cursor:'pointer',lineHeight:1},closeScanner,'×'));
  wrap.appendChild(hdr);
  const body=div({flex:1,display:'flex',flexDirection:'column',padding:20,gap:14,overflowY:'auto'});
  body.appendChild(div({background:'rgba(255,255,255,0.08)',borderRadius:12,padding:16,color:'#ccc',fontSize:13,lineHeight:1.8},
    div({color:'white',fontWeight:700,fontSize:14,marginBottom:4},'Nasıl Taranır?'),
    '1. Fotoğraf Çek butonuna basın\n2. Barkodu kameraya getirin\n3. Uygulama otomatik okur'
  ));
  body.appendChild(btn({padding:18,background:GOLD,color:'white',border:'none',borderRadius:14,fontWeight:700,fontSize:18,cursor:'pointer'},()=>document.getElementById('scanner-file')?.click(),'📷 Fotoğraf Çek'));
  const inp=h('input',{id:'scanner-file',type:'file',accept:'image/*',capture:'environment',style:{display:'none'}});
  inp.addEventListener('change',handleScan);
  body.appendChild(inp);
  body.appendChild(div({display:'flex',alignItems:'center',gap:10,color:'#666',fontSize:12},
    div({flex:1,height:1,background:'rgba(255,255,255,0.15)'}),
    'veya',
    div({flex:1,height:1,background:'rgba(255,255,255,0.15)'})
  ));
  const manRow=div({display:'flex',gap:8});
  const minp=h('input',{id:'manual-bc',type:'number',placeholder:'8690000000000',style:{flex:1,padding:'12px',border:'none',borderRadius:9,fontSize:15,outline:'none',background:'white'}});
  minp.addEventListener('keydown',e=>{if(e.key==='Enter') doManualLookup();});
  manRow.appendChild(minp);
  manRow.appendChild(btn({padding:'12px 18px',background:GOLD,color:'white',border:'none',borderRadius:9,fontWeight:700,cursor:'pointer'},doManualLookup,'Ara'));
  body.appendChild(manRow);
  wrap.appendChild(body);
  return wrap;
}

function closeScanner(){state.scannerOpen=false;render();}

async function handleScan(e){
  const f=e.target.files[0]; if(!f) return;
  showScanStatus('🔍 Barkod okunuyor...');
  try{
    if(!('BarcodeDetector' in window)){showScanStatus('❌ Desteklenmiyor — manuel girin');return;}
    const bm=await createImageBitmap(f);
    const det=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','itf']});
    const res=await det.detect(bm);
    if(res.length>0) await doLookup(res[0].rawValue);
    else showScanStatus('⚠️ Okunamadı — tekrar deneyin');
  }catch(e){showScanStatus('⚠️ Hata — manuel girin');}
  e.target.value='';
}

function showScanStatus(msg){
  const el=document.getElementById('scan-status');
  if(el) el.textContent=msg;
  else alert(msg);
}

async function doManualLookup(){
  const bc=document.getElementById('manual-bc')?.value?.trim();
  if(!bc) return;
  await doLookup(bc);
}

async function doLookup(bc){
  showScanStatus('🌐 Ürün aranıyor...');
  let name='',qty='';
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${bc}.json`);
    const data=await res.json();
    if(data.status===1){
      name=(data.product.product_name_tr||data.product.product_name||'').trim().split(',')[0].trim();
      qty=data.product.quantity||'';
    }
  }catch(e){}
  state.sktItem.barkod=bc;
  state.sktItem.urun=name;
  state.sktItem.gramaj=qty;
  state.scannerOpen=false;
  render();
}

function renderRapor(){
  const fd=state.fd;
  const score=calcScore(fd);
  const sc2=sco(score);
  const g=fd.genel;
  const tp=[fd.raf,fd.skt,fd.etiket,fd.depo,fd.personel,fd.iade,fd.degerl].reduce((n,s)=>n+(s.photos||[]).length,0);
  const rows=[['Raf & Planogram',fd.raf.planogram],['SKT Durumu',fd.skt.sktVar==='Evet'?'🔴 Sorunlu':fd.skt.sktVar==='Hayır'?'✅ Temiz':'—'],['Fiyat & Etiket',fd.etiket.dogruluk],['Depo Düzeni',fd.depo.genel],['Personel',fd.personel.unifroma],['İade Durumu',fd.iade.var==='Evet'?`⚠️ ${fd.iade.adet||'?'} ürün`:fd.iade.var==='Hayır'?'✅ Yok':'—']];
  const vc=v=>!v||v==='—'?'#aaa':v.includes('✅')||['Tam','İyi'].includes(v)?GREEN:v.includes('⚠️')||['Kısmi','Orta'].includes(v)?GOLD:RED;
  const wrap=div({});
  wrap.appendChild(secTitle('📄','Rapor & Gönder','Özeti görüntüle, sisteme kaydet ve indir'));

  const hbox=div({background:`${NAVY}12`,border:`1px solid ${NAVY}30`,borderRadius:12,padding:16,marginBottom:14});
  const hrow=div({display:'flex',justifyContent:'space-between',alignItems:'center'});
  const hleft=div({});
  hleft.appendChild(div({fontWeight:700,color:NAVY,fontSize:15},g.sube||'Şube belirtilmedi'));
  hleft.appendChild(div({fontSize:12,color:'#555',marginTop:2},`${g.tarih} • ${g.bas||'--:--'} – ${g.bitis||'--:--'}`));
  hleft.appendChild(div({fontSize:12,color:'#555'},g.denetci));
  if(tp>0) hleft.appendChild(div({fontSize:12,color:GOLD,marginTop:2},`📸 ${tp} fotoğraf`));
  hrow.appendChild(hleft);
  const badge=div({textAlign:'center',background:sc2,color:'white',borderRadius:12,padding:'10px 16px',minWidth:72});
  badge.appendChild(div({fontSize:32,fontWeight:800,lineHeight:1},String(score)));
  badge.appendChild(div({fontSize:11},'/100'));
  hrow.appendChild(badge);
  hbox.appendChild(hrow);
  hbox.appendChild(div({marginTop:10,fontSize:13,fontWeight:700,color:sc2},slbl(score)));
  wrap.appendChild(hbox);

  const rc=card([]);
  rows.forEach(([l,v],i)=>{
    const row=div({display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:i<rows.length-1?'1px solid #eee':'none'});
    row.appendChild(div({fontSize:14,color:'#333'},l));
    row.appendChild(div({fontSize:13,fontWeight:700,color:vc(v)},v||'—'));
    rc.appendChild(row);
  });
  wrap.appendChild(rc);

  if((fd.skt.liste||[]).length>0){
    const sc=card([],{style:{background:'#FDECEA',border:`1px solid ${RED}`}});
    sc.appendChild(div({fontWeight:700,color:RED,marginBottom:8},`🔴 SKT Sorunlu Ürünler (${fd.skt.liste.length} adet)`));
    fd.skt.liste.forEach((it,i)=>{
      const r=div({fontSize:13,padding:'5px 0',borderBottom:'1px solid #FAD5D2'});
      r.innerHTML=`<b>${it.urun}</b>${it.gramaj?` <span style="color:#888">${it.gramaj}</span>`:''} — SKT: ${it.skt||'?'} — ${it.miktar||'?'} adet`;
      sc.appendChild(r);
    });
    wrap.appendChild(sc);
  }

  const btns=div({display:'flex',flexDirection:'column',gap:12,marginTop:24});
  if(!state.submitted){
    btns.appendChild(btn({padding:16,background:state.submitting?'#aaa':GREEN,color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:16,cursor:state.submitting?'default':'pointer'},
      state.submitting?null:doSubmit, state.submitting?'⏳ Gönderiliyor...':'☁️ Sisteme Kaydet & Gönder'));
  } else {
    btns.appendChild(div({padding:16,background:'#E8F5E9',border:`1px solid ${GREEN}`,borderRadius:12,textAlign:'center',color:GREEN,fontWeight:700,fontSize:15},'✅ Denetim sisteme kaydedildi!'));
  }
  btns.appendChild(btn({padding:14,background:RED,color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:15,cursor:'pointer'},doPDF,'📄 PDF İndir'));
  btns.appendChild(btn({padding:14,background:NAVY,color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:15,cursor:'pointer'},doWord,'📝 Word İndir'));
  wrap.appendChild(btns);
  return wrap;
}

async function doSubmit(){
  if(state.submitting) return;
  state.submitting=true;render();
  const fd=state.fd, score=calcScore(fd);
  const pl={sube:fd.genel.sube||state.user.sube||'',tarih:fd.genel.tarih,denetci:fd.genel.denetci,score,
    rafPlanogram:fd.raf.planogram,sktDurum:fd.skt.sktVar==='Evet'?'🔴 Sorunlu':fd.skt.sktVar==='Hayır'?'✅ Temiz':'—',
    etiketDurum:fd.etiket.dogruluk,depoDurum:fd.depo.genel,personelDurum:fd.personel.unifroma,
    iadeDurum:fd.iade.var==='Evet'?`⚠️ ${fd.iade.adet||'?'} ürün`:fd.iade.var==='Hayır'?'✅ Yok':'—',
    sktListe:fd.skt.liste||[],kritikBulgu:fd.degerl.kritik||'',yeniAksiyonlar:fd.degerl.yeni||'',notlar:fd.degerl.genel||'',userId:state.user.id};
  const id=await fbSave(pl);
  state.submitting=false;
  if(id){state.submitted=true;showStatus('✅ Sisteme kaydedildi!',4000);}
  else showStatus('⚠️ Bağlantı hatası',3000);
}

function doPDF(){
  const html=buildRpt(state.fd,calcScore(state.fd));
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const w=window.open(url,'_blank');
  if(w) w.addEventListener('load',()=>setTimeout(()=>w.print(),500));
  setTimeout(()=>URL.revokeObjectURL(url),30000);
}
function doWord(){
  const html=buildRpt(state.fd,calcScore(state.fd));
  const blob=new Blob(['\ufeff'+html],{type:'application/msword;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`Denetim_${(state.fd.genel.sube||'Sube').replace(/ /g,'_')}_${state.fd.genel.tarih}.doc`;
  a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);
}

// ── Main Render ────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(!app) return;
  app.innerHTML='';

  let view;
  if(state.view==='login') view=renderLogin();
  else if(state.view==='admin') view=renderAdmin();
  else if(state.view==='detail') view=renderDetail();
  else view=renderForm();

  app.appendChild(view);
  if(state.scannerOpen) app.appendChild(renderScanner());
}

// ── Init ───────────────────────────────────────────────────────────
function init(){
  // Check saved session
  try{const s=localStorage.getItem('bp-user');if(s){const u=JSON.parse(s);state.user=u;if(u.role==='admin'){state.view='admin';loadDenetimler();}else{state.view='form';try{const p=JSON.parse(localStorage.getItem(LKEY)||'{}');state.fd=p.fd||mkFd(u);state.step=p.step||0;}catch(e){state.fd=mkFd(u);}}}}catch(e){}

  render();

  // Hide splash
  setTimeout(()=>{
    const sp=document.getElementById('splash');
    if(sp){sp.classList.add('hide');setTimeout(()=>sp.remove(),400);}
  },300);
}

// Start when Firebase is ready (or timeout)
if(window._fbOk!==undefined) init();
else window.addEventListener('fb-ready', init);
setTimeout(()=>{if(!document.getElementById('app')?.children.length) init();}, 3000);

// SW
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
