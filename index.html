<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#F0F2F5;color:#1a1a1a;overscroll-behavior-y:contain}
input,textarea,select,button{font-family:inherit;font-size:16px}
button{cursor:pointer;transition:opacity .15s,transform .1s}
button:active{opacity:.8;transform:scale(.98)}

/* ── Splash ── */
#splash{position:fixed;inset:0;background:#1B3A6B;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#splash.hide{opacity:0;pointer-events:none}

/* ── App Shell ── */
.app{max-width:700px;margin:0 auto;min-height:100vh;background:#F0F2F5}

/* ── Header ── */
.hdr{background:#1B3A6B;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hdr-brand{color:white;font-weight:800;font-size:15px;letter-spacing:.3px}
.hdr-sub{color:rgba(255,255,255,.65);font-size:12px;margin-top:2px}
.hdr-btn{background:rgba(255,255,255,.15);border:none;color:white;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600}
.hdr-btns{display:flex;gap:8px;align-items:center}
.hdr-status{font-size:11px;color:#90CAF9}

/* ── Progress ── */
.prog{background:white;padding:12px 16px;border-bottom:1px solid #E8ECF0}
.prog-row{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-name{font-size:14px;color:#1B3A6B;font-weight:700}
.prog-count{font-size:12px;color:#888}
.prog-bar{height:6px;background:#E8ECF0;border-radius:3px;margin-bottom:10px;overflow:hidden}
.prog-fill{height:100%;background:#1B3A6B;border-radius:3px;transition:width .3s}
.prog-dots{display:flex;justify-content:space-between}
.prog-dot{width:28px;height:28px;border-radius:50%;border:none;color:white;font-size:11px;font-weight:700;transition:all .2s}

/* ── Content ── */
.content{padding:16px;padding-bottom:100px}

/* ── Cards ── */
.card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card-red{background:#FFF5F5;border:1.5px solid #FFCDD2;border-radius:16px;padding:20px;margin-bottom:16px}

/* ── Section Title ── */
.sec-icon{font-size:28px;margin-bottom:6px}
.sec-title{font-size:20px;font-weight:800;color:#1B3A6B;margin-bottom:4px}
.sec-sub{font-size:13px;color:#888;margin-bottom:20px}

/* ── Form Elements ── */
.field{margin-bottom:20px}
.field:last-child{margin-bottom:0}
.field-label{font-size:13px;font-weight:600;color:#555;margin-bottom:8px;display:block}
.field-label .req{color:#E53935;margin-left:2px}
.field-input{width:100%;padding:14px 16px;border:1.5px solid #E0E0E0;border-radius:12px;font-size:16px;outline:none;background:white;transition:border-color .2s}
.field-input:focus{border-color:#1B3A6B}
.field-textarea{width:100%;padding:14px 16px;border:1.5px solid #E0E0E0;border-radius:12px;font-size:15px;outline:none;resize:vertical;background:white;min-height:80px;transition:border-color .2s}
.field-textarea:focus{border-color:#1B3A6B}
.field-select{width:100%;padding:14px 16px;border:1.5px solid #E0E0E0;border-radius:12px;font-size:16px;background:white;outline:none;-webkit-appearance:none}
.field-readonly{padding:14px 16px;background:#F5F7FA;border-radius:12px;font-size:15px;font-weight:600;color:#1B3A6B}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Radio ── */
.radio-group{margin-bottom:20px}
.radio-label{font-size:13px;font-weight:600;color:#555;margin-bottom:10px}
.radio-opts{display:flex;gap:8px;flex-wrap:wrap}
.ropt{padding:10px 16px;border-radius:24px;border:2px solid #E0E0E0;background:white;color:#555;font-size:14px;font-weight:500;transition:all .15s}
.ropt.sel-green{background:#2E7D32;border-color:#2E7D32;color:white;font-weight:700}
.ropt.sel-gold{background:#F57F17;border-color:#F57F17;color:white;font-weight:700}
.ropt.sel-red{background:#C62828;border-color:#C62828;color:white;font-weight:700}
.ropt.sel-navy{background:#1B3A6B;border-color:#1B3A6B;color:white;font-weight:700}

/* ── Photos ── */

.photos-label{font-size:13px;font-weight:600;color:#555;margin-bottom:10px}
.photos-row{display:flex;flex-wrap:wrap;gap:10px}
.photo-wrap{position:relative;width:80px;height:80px}

.photo-add{width:80px;height:80px;border-radius:12px;border:2px dashed #1B3A6B;background:#EEF2F9;color:#1B3A6B;font-size:26px;display:flex;align-items:center;justify-content:center}

/* ── SKT Box ── */
.skt-box{background:#FFF5F5;border:1.5px solid #FFCDD2;border-radius:16px;padding:16px;margin-bottom:16px}
.skt-box-title{font-weight:700;color:#C62828;font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.skt-form{background:white;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.skt-brow{display:flex;gap:8px;margin-bottom:12px}
.skt-inp{width:100%;padding:12px 14px;border:1.5px solid #E0E0E0;border-radius:10px;font-size:15px;outline:none}
.skt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.skt-field{}
.skt-flabel{font-size:12px;color:#888;margin-bottom:5px;font-weight:500}
.tara-btn{padding:12px 14px;background:#1B3A6B;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;white-space:nowrap;flex-shrink:0}
.skt-add-btn{width:100%;padding:14px;background:#C62828;color:white;border:none;border-radius:10px;font-weight:700;font-size:15px}

.skt-item{background:white;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}

/* ── Score Box ── */

/* ── Rapor Summary ── */
.summary-card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #F5F5F5}
.summary-row:last-child{border-bottom:none}

.badge-gold{color:#F57F17}
.badge-red{color:#C62828}

/* ── Action Buttons ── */
.action-btns{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.btn-submit{padding:18px;background:#2E7D32;color:white;border:none;border-radius:14px;font-weight:700;font-size:17px;width:100%}

.btn-success{padding:18px;background:#E8F5E9;border:1.5px solid #2E7D32;border-radius:14px;font-weight:700;font-size:16px;color:#2E7D32;width:100%}
.btn-pdf{padding:16px;background:#C62828;color:white;border:none;border-radius:14px;font-weight:700;font-size:16px;width:100%}
.btn-word{padding:16px;background:#1B3A6B;color:white;border:none;border-radius:14px;font-weight:700;font-size:16px;width:100%}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:700px;background:white;border-top:1px solid #E8ECF0;padding:12px 16px;display:flex;gap:12px;box-shadow:0 -4px 16px rgba(0,0,0,.08);z-index:99}

/* ── Login ── */
.login-wrap{min-height:100vh;background:#1B3A6B;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.login-hero{text-align:center;margin-bottom:28px}
.login-icon{font-size:56px;margin-bottom:12px}

.login-box{background:white;border-radius:24px;padding:28px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-title{font-size:18px;font-weight:700;color:#1B3A6B;margin-bottom:16px}
.login-label{font-size:13px;font-weight:600;color:#666;margin-bottom:10px}
.user-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.user-btn{padding:14px 16px;border-radius:12px;border:2px solid #E8ECF0;background:white;color:#444;font-size:15px;text-align:left;width:100%;font-weight:500;transition:all .15s}
.user-btn.sel-admin{border-color:#F57F17;background:#FFF8E7;color:#E65100;font-weight:700}

.login-footer{color:rgba(255,255,255,.3);font-size:12px;margin-top:20px;text-align:center}

.admin-wrap{max-width:700px;margin:0 auto;background:#F0F2F5;min-height:100vh}
.admin-hdr{background:#1B3A6B;color:white;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}

.section-hdr{font-weight:700;color:#1B3A6B;font-size:15px;margin-bottom:12px}
.denetim-card{width:100%;background:white;border:none;border-radius:14px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.08);text-align:left}

.refresh-btn{width:100%;padding:14px;background:#EEF2F9;color:#1B3A6B;border:none;border-radius:12px;font-weight:700;font-size:14px;margin-top:8px}

/* ── Detail ── */
.detail-hdr{background:#1B3A6B;color:white;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}

.detail-title{font-weight:800;font-size:16px}
.detail-sub{font-size:12px;opacity:.7;margin-top:1px}

/* ── Scanner ── */
.scanner-wrap{position:fixed;inset:0;background:rgba(10,10,10,.96);z-index:2000;display:flex;flex-direction:column}
.scanner-hdr{background:#1B3A6B;padding:16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.scanner-title{color:white;font-weight:700;font-size:17px}
.scanner-close{background:none;border:none;color:white;font-size:30px;line-height:1;padding:0}
.scanner-body{flex:1;padding:24px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}

.fade-in{animation:fi .2s ease}

<script>
const NAVY='#1B3A6B',RED='#C62828',GOLD='#F57F17',GREEN='#2E7D32';
const LKEY='bp-v5';
const BRANCHES=['Adliye Şubesi','Adana Yolu Şubesi','Cengiz Topel Şubesi','Andırın Caddesi Şubesi','Osmaniye Yolu Şubesi','Merkez Depo'];
const STEPS=['Genel','Raf','SKT','Etiket','Depo','Personel','İade','Değerl.','Rapor'];
const USERS=[
  {id:'admin',name:'Mehmet Konur',role:'admin',pin:'1234',sube:null,label:'👑 Admin — Mehmet Konur'},
  {id:'adliye',name:'Adliye Şubesi',role:'personel',pin:'1001',sube:'Adliye Şubesi',label:'🏪 Adliye Şubesi'},
  {id:'adana',name:'Adana Yolu Şubesi',role:'personel',pin:'1002',sube:'Adana Yolu Şubesi',label:'🏪 Adana Yolu Şubesi'},
  {id:'cengiz',name:'Cengiz Topel Şubesi',role:'personel',pin:'1003',sube:'Cengiz Topel Şubesi',label:'🏪 Cengiz Topel Şubesi'},
  {id:'andirin',name:'Andırın Cad. Şubesi',role:'personel',pin:'1004',sube:'Andırın Caddesi Şubesi',label:'🏪 Andırın Caddesi Şubesi'},
  {id:'osmaniye',name:'Osmaniye Yolu Şubesi',role:'personel',pin:'1005',sube:'Osmaniye Yolu Şubesi',label:'🏪 Osmaniye Yolu Şubesi'},
  {id:'depo',name:'Merkez Depo',role:'personel',pin:'1006',sube:'Merkez Depo',label:'🏭 Merkez Depo'},
];

// ── State ──────────────────────────────────────────────────────────
let S={
  view:'login',user:null,step:0,fd:null,
  status:'',statusTimer:null,
  denetimler:[],selD:null,
  loginSel:null,loginPin:'',loginErr:'',
  adminFilt:'',
  submitting:false,submitted:false,
  scanOpen:false,
  sktItem:{barkod:'',urun:'',gramaj:'',skt:'',miktar:'',alan:''},
};

function mkFd(u){return{
  genel:{sube:u?.sube||'',tarih:new Date().toISOString().split('T')[0],bas:'',bitis:'',denetci:''},
  raf:{planogram:'',marka:'',doluluk:'',fifo:'',notlar:'',photos:[]},
  skt:{sktVar:'',yakinVar:'',fifo:'',liste:[],notlar:'',photos:[]},
  etiket:{dogruluk:'',kampanya:'',eksik:'',yanlis:'',notlar:'',photos:[]},
  depo:{genel:'',fifo:'',transfer:'',iade:'',soguk:'',notlar:'',photos:[]},
  personel:{unifroma:'',hijyen:'',gorev:'',musteri:'',notlar:'',photos:[]},
  iade:{var:'',adet:'',firma:'',sure:'',notlar:'',photos:[]},
  degerl:{kritik:'',onceki:'',yeni:'',genel:'',photos:[]},
};}

function calcScore(fd){
  const v=(val,g,m=[])=>val===''||val===undefined?null:g.includes(val)?1:m.includes(val)?0.6:0;
  const avg=a=>{const f=a.filter(x=>x!==null);return f.length?f.reduce((a,b)=>a+b,0)/f.length:0.7};
  return Math.round(
    avg([v(fd.raf.planogram,['Tam'],['Kısmi']),v(fd.raf.marka,['Tam'],['Kısmi']),v(fd.raf.fifo,['Tam'],['Kısmi'])])*20+
    avg([v(fd.skt.sktVar,['Hayır']),v(fd.skt.fifo,['Tam'],['Kısmi'])])*25+
    avg([v(fd.etiket.dogruluk,['Tam'],['Kısmi']),v(fd.etiket.kampanya,['Tam'],['Kısmi'])])*15+
    avg([v(fd.depo.genel,['İyi'],['Orta']),v(fd.depo.fifo,['Tam'],['Kısmi']),v(fd.depo.transfer,['Tam'],['Kısmi'])])*15+
    avg([v(fd.personel.unifroma,['Tam'],['Kısmi']),v(fd.personel.hijyen,['Tam'],['Kısmi']),v(fd.personel.gorev,['Tam'],['Kısmi'])])*15+
    avg([v(fd.iade.var,['Hayır'])])*10
  );

function compress(file){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const M=900,sc=Math.min(1,M/Math.max(img.width,img.height));c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);c.getContext('2d').drawImage(img,0,0,c.width,c.height);r(c.toDataURL('image/jpeg',0.65));};img.src=e.target.result;};rd.readAsDataURL(file);});}

async function fbSave(data){if(!window._fbOk)return null;try{const{collection,addDoc,serverTimestamp}=window._fc;const ref=await addDoc(collection(window._db,'denetimler'),{...data,ts:serverTimestamp(),ca:new Date().toISOString()});return ref.id;}catch(e){return null;}}
async function fbGet(sube=null){if(!window._fbOk)return[];try{const{collection,getDocs,query,orderBy,where}=window._fc;const q=sube?query(collection(window._db,'denetimler'),where('sube','==',sube),orderBy('ca','desc')):query(collection(window._db,'denetimler'),orderBy('ca','desc'));const snap=await getDocs(q);return snap.docs.map(d=>({id:d.id,...d.data()}));}catch(e){return[];}}

function showStatus(msg,ms=2200){

  S.statusTimer=setTimeout(()=>{S.status='';const st2=document.querySelector('.hdr-status');if(st2)st2.textContent='';},ms);
}
function saveFd(){
  try{localStorage.setItem(LKEY,JSON.stringify({fd:S.fd,step:S.step}));}catch(e){}

let _saveTimer=null;
function upd(sec,f,v){
  S.fd[sec][f]=v;

  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    try{localStorage.setItem(LKEY,JSON.stringify({fd:S.fd,step:S.step}));}catch(e){}

// ── DOM Helpers ────────────────────────────────────────────────────
function el(tag,cls,text){const e=document.createElement(tag);if(cls)e.className=cls;if(text!==undefined)e.textContent=text;return e;}
function on(el,ev,fn){el.addEventListener(ev,fn);return el;}

// ── Components ─────────────────────────────────────────────────────
function field(label,inputEl,req=false){
  const w=el('div','field');
  const l=el('label','field-label',label);
  if(req){const s=el('span','req','*');l.appendChild(s);}
  w.appendChild(l);w.appendChild(inputEl);
  return w;
}

function textInp(val,onChange,opts={}){
  const inp=el('input');
  inp.type=opts.type||'text';inp.value=val||'';inp.placeholder=opts.placeholder||'';
  inp.className='field-input';
  on(inp,'input',e=>onChange(e.target.value));
  return inp;
}

function taInp(val,onChange,opts={}){
  const ta=el('textarea');
  ta.value=val||'';ta.placeholder=opts.placeholder||'';ta.rows=opts.rows||3;
  ta.className='field-textarea';
  on(ta,'input',e=>onChange(e.target.value));
  return ta;
}

function radioGroup(label,opts,val,onChange,req=false){
  const w=el('div','radio-group');
  const l=el('div','radio-label',label);
  if(req){const s=el('span','req',' *');l.appendChild(s);}
  const row=el('div','radio-opts');
  opts.forEach(o=>{
    const b=el('button','ropt',o.l);
    if(val===o.v){
      if(o.c===GREEN)b.classList.add('sel-green');
      else if(o.c===GOLD)b.classList.add('sel-gold');
      else if(o.c===RED)b.classList.add('sel-red');
      else b.classList.add('sel-navy');
    }
    on(b,'click',()=>onChange(o.v));
    row.appendChild(b);
  });
  w.appendChild(l);w.appendChild(row);
  return w;
}

function photoPicker(photos,onChange){
  const w=el('div','photos-section');
  w.appendChild(el('div','photos-label','📸 Fotoğraflar'));
  const row=el('div','photos-row');
  photos.forEach(p=>{
    const pw=el('div','photo-wrap');
    const img=document.createElement('img');img.src=p.data;
    const del=el('button','photo-del','×');
    on(del,'click',()=>onChange(photos.filter(x=>x.id!==p.id)));
    pw.appendChild(img);pw.appendChild(del);row.appendChild(pw);
  });
  const inp=el('input');inp.type='file';inp.accept='image/*';inp.setAttribute('capture','environment');inp.style.display='none';
  on(inp,'change',async e=>{const f=e.target.files[0];if(!f)return;const data=await compress(f);onChange([...photos,{id:Date.now(),data}]);e.target.value='';});
  const add=el('button','photo-add','📷');on(add,'click',()=>inp.click());
  row.appendChild(add);w.appendChild(row);w.appendChild(inp);
  return w;
}

function renderScanner(){
  const w=el('div','scanner-wrap');
  const hdr=el('div','scanner-hdr');
  hdr.appendChild(el('span','scanner-title','📷 Barkod Tara'));
  const cls=el('button','scanner-close','×');on(cls,'click',closeScanner);
  hdr.appendChild(cls);w.appendChild(hdr);

  const body=el('div','scanner-body');
  const info=el('div','scanner-info');
  const strong=el('strong','','Nasıl Taranır?');
  info.appendChild(strong);
  info.appendChild(document.createTextNode('1. Fotoğraf Çek butonuna basın\n2. Barkodu kameraya getirin\n3. Ürün bilgileri otomatik dolar'));
  body.appendChild(info);

  const scanBtn=el('button','scan-btn','📷 Fotoğraf Çek');
  const inp=el('input');inp.type='file';inp.accept='image/*';inp.setAttribute('capture','environment');inp.style.display='none';inp.id='scanner-file';
  on(inp,'change',handleScan);
  on(scanBtn,'click',()=>inp.click());
  body.appendChild(scanBtn);body.appendChild(inp);

  body.appendChild(el('div',''));// spacer
  const orDiv=el('div','scanner-or');
  orDiv.appendChild(el('div','scanner-or-line'));
  orDiv.appendChild(document.createTextNode('veya manuel girin'));
  orDiv.appendChild(el('div','scanner-or-line'));
  body.appendChild(orDiv);

  const manRow=el('div','manual-row');
  const minp=el('input','manual-inp');minp.type='number';minp.placeholder='8690000000000';minp.id='manual-bc';
  on(minp,'keydown',e=>{if(e.key==='Enter')doManualLookup();});
  const mbtn=el('button','manual-btn','Ara');on(mbtn,'click',doManualLookup);
  manRow.appendChild(minp);manRow.appendChild(mbtn);
  body.appendChild(manRow);

  w.appendChild(body);
  return w;
}

function closeScanner(){S.scanOpen=false;render();}

async function handleScan(e){
  const f=e.target.files[0];if(!f)return;
  try{
    if(!('BarcodeDetector' in window)){e.target.value='';return;}
    const bm=await createImageBitmap(f);
    const det=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','itf']});
    const res=await det.detect(bm);
    if(res.length>0) await doLookup(res[0].rawValue);
  }catch(err){}
  e.target.value='';
}

async function doManualLookup(){
  const bc=document.getElementById('manual-bc')?.value?.trim();
  if(bc) await doLookup(bc);
}

async function doLookup(bc){
  // Silent lookup - user sees nothing until result arrives
  S.sktItem.barkod=bc;
  S.scanOpen=false;
  render(); // close scanner first, show current barkod
  
  // Fetch in background
  let name='',qty='';
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${bc}.json`);
    const data=await res.json();
    if(data.status===1){
      name=(data.product.product_name_tr||data.product.product_name||'').trim().split(',')[0].trim();
      qty=data.product.quantity||'';
    }
  }catch(e){}
  S.sktItem.urun=name;
  S.sktItem.gramaj=qty;
  render();
}

function buildRpt(fd,score){
  const ns=v=>v||'-',g=fd.genel,sc2=sco(score);
  const sktR=(fd.skt.liste||[]).map(it=>`<tr><td>${ns(it.barkod)}</td><td><b>${it.urun}</b>${it.gramaj?` <small>${it.gramaj}</small>`:''}</td><td>${ns(it.skt)}</td><td>${ns(it.miktar)}</td><td>${ns(it.alan)}</td></tr>`).join('');
  const row=(l,v)=>v?`<div class="row"><span class="lbl">${l}</span><span>${v}</span></div>`:'';
  const pg=(ph=[])=>ph.length>0?`<div class="ph"><div class="pl">📸 Fotoğraflar:</div><div class="pg">${ph.slice(0,6).map(p=>`<img src="${p.data}">`).join('')}</div></div>`:'';

is)}</td></tr><tr><td>Denetçi</td><td>${ns(g.denetci)}</td></tr></table><div class="sb"><div class="n">${score}</div><div>/100</div><div class="lb">${slbl(score).replace(/[✅⚠️🔴] /,'')}</div></div><div class="sec">RAF & PLANOGRAM</div>${row('Planogram',fd.raf.planogram)}${row('Marka Blok',fd.raf.marka)}${row('Doluluk',fd.raf.doluluk)}${row('FIFO',fd.raf.fifo)}${fd.raf.notlar?`<div class="note">${fd.raf.notlar}</div>`:''}${pg(fd.raf.photos)}<div class="sec">SKT KONTROLÜ</div>${row('SKT Geçmiş',fd.skt.sktVar)}${row('Yakın SKT',fd.skt.yakinVar)}${row('FIFO',fd.skt.fifo)}${sktR?`<div class="rb"><h4>🔴 SKT Sorunlu Ürünler</h4><table class="dt"><tr><th>Barkod</th><th>Ürün</th><th>SKT</th><th>Miktar</th><th>Alan</th></tr>${sktR}</table></div>`:''}${fd.skt.notlar?`<div class="note">${fd.skt.notlar}</div>`:''}${pg(fd.skt.photos)}<div class="sec">FİYAT & ETİKET</div>${row('Doğruluk',fd.etiket.dogruluk)}${row('Kampanya',fd.etiket.kampanya)}<div class="row"><span class="lbl">Eksik Etiket</span><span>${fd.etiket.eksik||'0'} adet</span></div><div class="row"><span class="lbl">Yanlış Fiyat</span><span>${fd.etiket.yanlis||'0'} adet</span></div>${fd.etiket.notlar?`<div class="note">${fd.etiket.notlar}</div>`:''}${pg(fd.etiket.photos)}<div class="sec">DEPO DÜZENİ</div>${row('Genel',fd.depo.genel)}${row('FIFO',fd.depo.fifo)}${row('Transfer',fd.depo.transfer)}${row('İade Köşesi',fd.depo.iade)}${row('Soğuk Zincir',fd.depo.soguk)}${fd.depo.notlar?`<div class="note">${fd.depo.notlar}</div>`:''}${pg(fd.depo.photos)}<div class="sec">PERSONEL & HİJYEN</div>${row('Üniforma',fd.personel.unifroma)}${row('Hijyen',fd.personel.hijyen)}${row('Görev',fd.personel.gorev)}${row('Müşteri',fd.personel.musteri)}${fd.personel.notlar?`<div class="note">${fd.personel.notlar}</div>`:''}${pg(fd.personel.photos)}<div class="sec">İADE YÖNETİMİ</div>${row('Bekleyen',fd.iade.var)}${fd.iade.var==='Evet'?`${row('Adet',fd.iade.adet)}${row('Firmalar',fd.iade.firma)}${row('Bekleme',fd.iade.sure+' gün')}`:''}${fd.iade.notlar?`<div class="note">${fd.iade.notlar}</div>`:''}${pg(fd.iade.photos)}${fd.degerl.kritik?`<div class="rb" style="margin-top:14px"><h4>🔴 Kritik Bulgular</h4><p style="white-space:pre-wrap;font-size:12px;margin-top:5px">${fd.degerl.kritik}</p></div>`:''}${fd.degerl.yeni?`<div class="sec" style="background:#1B3A6B">AKSİYON PLANI</div><p style="white-space:pre-wrap;font-size:12px;padding:6px 0">${fd.degerl.yeni}</p>`:''}${fd.degerl.genel?`<div class="note" style="margin-top:10px">${fd.degerl.genel}</div>`:''}${pg(fd.degerl.photos)}<div class="sig"><div style="font-weight:700;color:#1B3A6B;font-size:13px">${ns(g.denetci)}</div><div style="color:#666;font-size:11px">Operasyon Müdürü | Bizim Pazar Gıda A.Ş.</div></div></div></body></html>`;
}

async function doSubmit(){
  if(S.submitting)return;S.submitting=true;render();
  const fd=S.fd,score=calcScore(fd);
  const pl={sube:fd.genel.sube||S.user.sube||'',tarih:fd.genel.tarih,denetci:fd.genel.denetci,score,
    rafPlanogram:fd.raf.planogram,sktDurum:fd.skt.sktVar==='Evet'?'🔴 Sorunlu':fd.skt.sktVar==='Hayır'?'✅ Temiz':'—',
    etiketDurum:fd.etiket.dogruluk,depoDurum:fd.depo.genel,personelDurum:fd.personel.unifroma,
    iadeDurum:fd.iade.var==='Evet'?`⚠️ ${fd.iade.adet||'?'} ürün`:fd.iade.var==='Hayır'?'✅ Yok':'—',
    sktListe:fd.skt.liste||[],kritikBulgu:fd.degerl.kritik||'',yeniAksiyonlar:fd.degerl.yeni||'',notlar:fd.degerl.genel||'',userId:S.user.id};

}
function doPDF(){const h=buildRpt(S.fd,calcScore(S.fd));const b=new Blob([h],{type:'text/html;charset=utf-8'});const u=URL.createObjectURL(b);const w=window.open(u,'_blank');if(w)w.addEventListener('load',()=>setTimeout(()=>w.print(),500));setTimeout(()=>URL.revokeObjectURL(u),30000);}

function renderLogin(){
  const w=el('div','login-wrap');

  hero.appendChild(el('div','login-brand','BİZİM PAZAR'));

  box.appendChild(el('div','login-label','Kullanıcı Seçin'));
  const ul=el('div','user-list');
  USERS.forEach(u=>{
    const cls=S.loginSel===u.id?(u.role==='admin'?'user-btn sel-admin':'user-btn sel-user'):'user-btn';
    const b=el('button',cls,u.label);
    on(b,'click',()=>{S.loginSel=u.id;S.loginPin='';S.loginErr='';render();});
    ul.appendChild(b);
  });
  box.appendChild(ul);
  if(S.loginSel){
    const pw=el('div','pin-wrap');
    pw.appendChild(el('div','pin-label','PIN Kodu'));
    const pi=el('input','pin-input');pi.type='password';pi.placeholder='••••';pi.value=S.loginPin;
    pi.style.borderColor=S.loginErr?RED:'#E0E0E0';
    on(pi,'input',e=>{S.loginPin=e.target.value;});
    on(pi,'keydown',e=>{if(e.key==='Enter')doLogin();});
    pw.appendChild(pi);box.appendChild(pw);
  }
  if(S.loginErr) box.appendChild(el('div','pin-err',S.loginErr));
  const lb=el('button','login-btn','Giriş Yap →');on(lb,'click',doLogin);box.appendChild(lb);
  w.appendChild(hero);w.appendChild(box);
  w.appendChild(el('div','login-footer','Bizim Pazar Gıda A.Ş.'));
  return w;
}

function doLogin(){
  if(!S.loginSel){S.loginErr='Kullanıcı seçin';render();return;}
  const u=USERS.find(x=>x.id===S.loginSel);
  if(u&&u.pin===S.loginPin){
    S.user=u;S.loginErr='';
    localStorage.setItem('bp-user',JSON.stringify(u));
    if(u.role==='admin'){
      S.view='admin';
      render(); // show admin shell immediately
      loadDenetimler(); // then load data
    } else {
      S.view='form';S.step=0;
      try{const p=JSON.parse(localStorage.getItem(LKEY)||'{}');S.fd=p.fd||mkFd(u);S.step=p.step||0;}catch(e){S.fd=mkFd(u);}
      render();
    }
  }else{S.loginErr='❌ PIN hatalı';S.loginPin='';render();}
}
function doLogout(){S.user=null;S.view='login';S.loginSel=null;S.loginPin='';S.loginErr='';localStorage.removeItem('bp-user');render();}

  hdr.appendChild(hl);hdr.appendChild(btns);w.appendChild(hdr);

  // Progress
  const pg=el('div','prog');
  const pr=el('div','prog-row');pr.appendChild(el('div','prog-name',STEPS[S.step]));pr.appendChild(el('div','prog-count',`${S.step+1}/${STEPS.length}`));
  pg.appendChild(pr);
  const pb=el('div','prog-bar');const pf=el('div','prog-fill');pf.style.width=`${prog}%`;pb.appendChild(pf);pg.appendChild(pb);
  const dots=el('div','prog-dots');
  STEPS.forEach((_,i)=>{
    const d=el('button','prog-dot',String(i+1));
    d.style.background=i<S.step?GOLD:i===S.step?NAVY:'#D0D5DD';
    on(d,'click',()=>goTo(i));dots.appendChild(d);
  });
  pg.appendChild(dots);w.appendChild(pg);

  // Content
  const steps=[stepGenel,stepRaf,stepSKT,stepEtiket,stepDepo,stepPersonel,stepIade,stepDegerl,stepRapor];
  const content=el('div','content');content.appendChild(steps[S.step]());w.appendChild(content);

  // Nav
  const nav=el('div','nav');
  if(S.step>0){const b=el('button','nav-back','← Geri');on(b,'click',()=>goTo(S.step-1));nav.appendChild(b);}
  if(S.step<STEPS.length-1){const b=el('button','nav-next','İleri →');on(b,'click',()=>goTo(S.step+1));nav.appendChild(b);}
  w.appendChild(nav);
  return w;
}

// ── Main Render ────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');if(!app)return;
  app.innerHTML='';
  let v;
  if(S.view==='login') v=renderLogin();
  else if(S.view==='admin') v=renderAdmin();
  else if(S.view==='detail') v=renderDetail();
  else v=renderForm();
  app.appendChild(v);
  if(S.scanOpen) app.appendChild(renderScanner());
}

function init(){
  try{const s=localStorage.getItem('bp-user');if(s){const u=JSON.parse(s);S.user=u;if(u.role==='admin'){S.view='admin';render();loadDenetimler();}else{S.view='form';try{const p=JSON.parse(localStorage.getItem(LKEY)||'{}');S.fd=p.fd||mkFd(u);S.step=p.step||0;}catch(e){S.fd=mkFd(u);}}}}catch(e){}
  render();
  const sp=document.getElementById('splash');
  if(sp){sp.classList.add('hide');setTimeout(()=>{if(sp.parentNode)sp.parentNode.removeChild(sp);},400);}
}

// Start app immediately - don't wait for Firebase
init();
// Firebase connects in background
window.addEventListener('fb-ready',()=>{
  // Firebase ready - if admin panel open, refresh data
  if(S.view==='admin') loadDenetimler();
});


</script>
